name: presence
description: Presence - Pedestrian Safety & Situational Awareness App
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.0

  # Maps
  google_maps_flutter: ^2.6.0

  # Location
  geolocator: ^11.1.0
  geocoding: ^3.0.0

  # Permissions
  permission_handler: ^11.3.1

  # Storage
  shared_preferences: ^2.3.1

  # Animations
  flutter_animate: ^4.5.0

  # Utils
  intl: ^0.19.0
  url_launcher: ^6.3.0
  uuid: ^4.4.0

  # Icons
  cupertino_icons: ^1.0.8
  material_symbols_icons: ^4.2719.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
