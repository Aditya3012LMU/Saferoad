<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Presence — Pedestrian Safety App</title>
<style>
:root {
  --primary:#00897B; --primary-dark:#26A69A; --primary-container:#B2DFDB;
  --on-primary:#fff; --on-primary-container:#00352F;
  --secondary:#546E7A; --tertiary:#5C6BC0; --tertiary-container:#E8EAF6;
  --surface:#fff; --bg:#F5F7F6; --surface-container:#EAF0EE;
  --surface-container-high:#E0EDEA;
  --on-surface:#191C1B; --on-surface-variant:#3F4946; --on-surface-dim:#6B7775;
  --outline:#6F7975; --outline-variant:#BEC9C5;
  --safe:#2E7D32; --safe-light:#66BB6A; --safe-surface:#E8F5E9;
  --caution:#F57F17; --caution-surface:#FFF8E1;
  --danger:#C62828; --danger-surface:#FFEBEE;
  --alert:#E64A19; --alert-surface:#FBE9E7;
  --sos:#D32F2F; --sos-dark:#B71C1C;
  --map-police:#1565C0;
  --r-xl:24px; --r-lg:20px; --r-md:16px; --r-sm:12px; --r-xs:8px;
  --sh-sm:0 2px 8px rgba(0,0,0,.07); --sh-md:0 4px 16px rgba(0,0,0,.10); --sh-lg:0 8px 32px rgba(0,0,0,.14);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:#0E1412;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:-apple-system,'Inter','Segoe UI',sans-serif;color:var(--on-surface);user-select:none;}

/* ── Shell ── */
.shell{width:375px;height:812px;background:var(--bg);border-radius:44px;overflow:hidden;
  box-shadow:0 0 0 10px #1a2220,0 32px 80px rgba(0,0,0,.7);
  display:flex;flex-direction:column;position:relative;}
.shell::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);
  width:120px;height:32px;background:#1a2220;border-radius:0 0 22px 22px;z-index:200;}

/* Status bar */
.status-bar{height:48px;display:flex;align-items:flex-end;justify-content:space-between;
  padding:0 24px 8px;font-size:12px;font-weight:600;position:relative;z-index:10;flex-shrink:0;}
.status-bar.dark{color:#fff;} .status-bar.light{color:var(--on-surface);}
.status-icons{display:flex;gap:6px;align-items:center;}

/* Screen slots */
.screen{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative;}
.screen-scroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;}
.screen-scroll::-webkit-scrollbar{display:none;}

/* ── Transitions ── */
.slide-in-right{animation:slideInRight .28s cubic-bezier(.25,.46,.45,.94) both;}
.slide-in-left {animation:slideInLeft  .28s cubic-bezier(.25,.46,.45,.94) both;}
.slide-out-left {animation:slideOutLeft  .28s cubic-bezier(.25,.46,.45,.94) both;}
.fade-in{animation:fadeIn .22s ease both;}
@keyframes slideInRight{from{transform:translateX(100%)}to{transform:translateX(0)}}
@keyframes slideInLeft {from{transform:translateX(-100%)}to{transform:translateX(0)}}
@keyframes slideOutLeft{from{transform:translateX(0)}to{transform:translateX(-100%)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* ── Bottom Nav ── */
.bottom-nav{background:var(--surface);border-top:1px solid var(--outline-variant);
  display:flex;padding:8px 4px 10px;flex-shrink:0;position:relative;z-index:50;}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:4px 2px;font-size:10px;font-weight:600;color:var(--on-surface-dim);cursor:pointer;
  transition:color .2s;}
.nav-item.active{color:var(--primary);}
.nav-pill{width:56px;height:28px;border-radius:14px;display:flex;align-items:center;justify-content:center;transition:background .2s;}
.nav-item.active .nav-pill{background:var(--primary-container);}
.nav-item svg{width:20px;height:20px;fill:currentColor;}

/* ── Buttons ── */
.btn{width:100%;padding:16px;border-radius:14px;border:none;cursor:pointer;
  font-size:15px;font-weight:700;font-family:inherit;transition:opacity .15s,transform .1s;display:flex;align-items:center;justify-content:center;gap:8px;}
.btn:active{transform:scale(.97);}
.btn-filled{background:var(--primary);color:#fff;}
.btn-outlined{background:transparent;border:1.5px solid var(--primary);color:var(--primary);}
.btn-danger{background:var(--danger);color:#fff;}
.btn svg{width:18px;height:18px;fill:currentColor;flex-shrink:0;}

/* ── Cards ── */
.card{background:var(--surface);border:1px solid var(--outline-variant);border-radius:var(--r-lg);overflow:hidden;}

/* ── Chips ── */
.chip{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:20px;
  font-size:11px;font-weight:600;background:var(--surface-container);color:var(--on-surface-variant);}
.chip.active{background:var(--primary-container);color:var(--primary);border:1.5px solid var(--primary);}

/* ── Safe badge ── */
.safe-badge{display:inline-flex;align-items:center;gap:5px;padding:5px 10px;border-radius:20px;
  background:var(--safe-surface);border:1.5px solid rgba(46,125,50,.3);color:var(--safe);font-size:12px;font-weight:700;}
.caution-badge{background:var(--caution-surface);border-color:rgba(245,127,23,.3);color:var(--caution);}
.danger-badge{background:var(--danger-surface);border-color:rgba(198,40,40,.3);color:var(--danger);}

/* ────────────────────────────────────────────
   ONBOARDING
──────────────────────────────────────────── */
.ob-screen{flex:1;display:flex;flex-direction:column;align-items:center;
  padding:0 28px 32px;position:relative;}
.ob-skip{align-self:flex-end;padding:10px 4px;font-size:13px;font-weight:600;
  color:rgba(255,255,255,.6);cursor:pointer;background:none;border:none;font-family:inherit;}
.ob-illus{width:130px;height:130px;border-radius:65px;display:flex;align-items:center;
  justify-content:center;margin:16px auto 32px;animation:fadeIn .4s ease;}
.ob-illus svg{width:64px;height:64px;fill:white;}
.ob-title{font-size:30px;font-weight:800;color:#fff;text-align:center;line-height:1.15;margin-bottom:18px;}
.ob-body{font-size:15px;color:rgba(255,255,255,.82);text-align:center;line-height:1.65;flex:1;}
.ob-dots{display:flex;justify-content:center;gap:7px;margin:24px 0 20px;}
.ob-dot{height:8px;border-radius:4px;background:rgba(255,255,255,.3);transition:all .3s;}
.ob-dot.active{width:24px;background:#fff;} .ob-dot:not(.active){width:8px;}

/* ────────────────────────────────────────────
   HOME MAP
──────────────────────────────────────────── */
.map-bg{position:absolute;inset:0;background:#dde8e5;overflow:hidden;}
.map-road{position:absolute;background:rgba(255,255,255,.85);}
.map-zone{position:absolute;border-radius:50%;}
.map-content{position:relative;z-index:2;display:flex;flex-direction:column;flex:1;pointer-events:none;}
.map-content>*{pointer-events:all;}

.home-topbar{display:flex;align-items:center;gap:8px;padding:6px 14px 10px;}
.brand-pill{display:flex;align-items:center;gap:6px;background:var(--surface);border-radius:20px;
  padding:7px 12px;box-shadow:var(--sh-md);font-size:13px;font-weight:700;color:var(--primary);}
.brand-pill svg{width:16px;height:16px;fill:var(--primary);}
.map-icon-btn{width:42px;height:42px;border-radius:50%;background:var(--surface);
  box-shadow:var(--sh-sm);display:flex;align-items:center;justify-content:center;
  cursor:pointer;border:none;transition:transform .15s;}
.map-icon-btn:active{transform:scale(.92);}
.map-icon-btn svg{width:18px;height:18px;fill:var(--on-surface-variant);}
.map-icon-btn.active svg{fill:var(--primary);}

.alert-banner{margin:0 12px 8px;padding:10px 12px;border-radius:var(--r-md);
  display:flex;align-items:center;gap:10px;animation:slideInRight .3s ease;}
.alert-banner.caution{background:var(--caution-surface);border:1.5px solid rgba(245,127,23,.3);}
.alert-banner.danger{background:var(--danger-surface);border:1.5px solid rgba(198,40,40,.3);}
.alert-banner.safe{background:var(--safe-surface);border:1.5px solid rgba(46,125,50,.3);}
.ab-icon{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.ab-icon svg{width:16px;height:16px;}
.alert-banner.caution .ab-icon{background:rgba(245,127,23,.15);}
.alert-banner.caution .ab-icon svg{fill:var(--caution);}
.alert-banner.caution .ab-text{color:var(--caution);}
.alert-banner.caution .ab-action{color:var(--caution);}
.alert-banner.danger .ab-icon{background:rgba(198,40,40,.15);}
.alert-banner.danger .ab-icon svg{fill:var(--danger);}
.alert-banner.danger .ab-text{color:var(--danger);}
.alert-banner.danger .ab-action{color:var(--danger);}
.alert-banner.safe .ab-icon{background:rgba(46,125,50,.15);}
.alert-banner.safe .ab-icon svg{fill:var(--safe);}
.alert-banner.safe .ab-text{color:var(--safe);}
.ab-text{font-size:11.5px;font-weight:600;flex:1;}
.ab-action{font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;}
.ab-close{font-size:16px;color:var(--on-surface-dim);cursor:pointer;background:none;border:none;padding:0 2px;}

.layer-chips-row{display:flex;gap:6px;padding:0 12px 8px;overflow-x:auto;}
.layer-chips-row::-webkit-scrollbar{display:none;}
.layer-chip{display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:20px;
  font-size:10.5px;font-weight:600;white-space:nowrap;cursor:pointer;
  background:var(--surface);box-shadow:var(--sh-sm);color:var(--on-surface-dim);
  border:1px solid transparent;transition:all .2s;flex-shrink:0;}
.layer-chip svg{width:12px;height:12px;fill:currentColor;}
.layer-chip.on-green{background:rgba(46,125,50,.12);color:var(--safe);border-color:rgba(46,125,50,.35);}
.layer-chip.on-amber{background:rgba(245,127,23,.1);color:var(--caution);border-color:rgba(245,127,23,.35);}
.layer-chip.on-blue{background:rgba(21,101,192,.1);color:var(--map-police);border-color:rgba(21,101,192,.35);}
.layer-chip.on-purple{background:rgba(92,107,192,.1);color:var(--tertiary);border-color:rgba(92,107,192,.35);}
.layer-chip.on-red{background:rgba(230,74,25,.1);color:var(--alert);border-color:rgba(230,74,25,.35);}

.home-bottom-panel{background:var(--surface);border-radius:24px 24px 0 0;
  box-shadow:0 -4px 24px rgba(0,0,0,.12);padding:8px 18px 12px;}
.drag-handle{width:32px;height:4px;border-radius:2px;background:var(--outline-variant);margin:0 auto 12px;}
.loc-row{display:flex;align-items:center;gap:5px;margin-bottom:12px;}
.loc-row svg{width:14px;height:14px;fill:var(--primary);}
.loc-row span{font-size:13px;color:var(--on-surface-variant);flex:1;}
.loc-row .time{font-size:12px;color:var(--on-surface-dim);}

/* Score card */
.score-card{border-radius:var(--r-lg);padding:14px;display:flex;align-items:center;gap:14px;margin-bottom:12px;}
.score-card.safe{background:var(--safe-surface);border:1.5px solid rgba(46,125,50,.25);}
.score-card.caution{background:var(--caution-surface);border:1.5px solid rgba(245,127,23,.25);}
.score-arc{width:64px;height:64px;flex-shrink:0;position:relative;display:flex;align-items:center;justify-content:center;}
.score-arc svg{position:absolute;inset:0;width:100%;height:100%;transform:rotate(-90deg);}
.score-num{font-size:16px;font-weight:800;}
.score-num.safe-c{color:var(--safe);}
.score-num.caution-c{color:var(--caution);}
.score-info h3{font-size:14px;font-weight:700;margin-bottom:2px;}
.score-info h3.safe-c{color:var(--safe);}
.score-info h3.caution-c{color:var(--caution);}
.score-info p{font-size:12px;color:var(--on-surface-variant);line-height:1.4;}
.score-feats{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px;}
.feat-chip{font-size:10px;font-weight:600;border-radius:20px;padding:2px 8px;}
.feat-chip.safe-c{background:rgba(46,125,50,.1);color:var(--safe);}

.action-row{display:flex;gap:10px;}
.btn-icon{flex:1;padding:14px;border-radius:14px;cursor:pointer;border:1.5px solid var(--primary);
  background:transparent;color:var(--primary);display:flex;align-items:center;justify-content:center;transition:transform .1s;}
.btn-icon:active{transform:scale(.93);}
.btn-icon svg{width:20px;height:20px;fill:var(--primary);}
.btn-icon.active{background:var(--primary-container);}

/* SOS */
.sos-fab{position:absolute;right:16px;width:62px;height:62px;border-radius:31px;
  background:linear-gradient(135deg,var(--sos-dark),var(--sos));
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  box-shadow:0 4px 18px rgba(211,47,47,.45);animation:sosPulse 1.8s ease-in-out infinite;
  border:none;z-index:60;transition:transform .15s;}
.sos-fab:active{transform:scale(.93);}
.sos-fab svg{width:28px;height:28px;fill:white;}
@keyframes sosPulse{0%,100%{box-shadow:0 0 0 0 rgba(211,47,47,.4),0 4px 18px rgba(211,47,47,.45);}
  50%{box-shadow:0 0 0 14px rgba(211,47,47,0),0 4px 18px rgba(211,47,47,.45);}}

/* ── Route Planner ── */
.app-bar{padding:14px 18px 12px;background:var(--surface);border-bottom:1px solid var(--outline-variant);
  font-size:18px;font-weight:800;flex-shrink:0;display:flex;align-items:center;gap:10px;}
.back-btn{background:none;border:none;cursor:pointer;padding:2px;display:flex;align-items:center;}
.back-btn svg{width:22px;height:22px;fill:var(--on-surface);}

.loc-field{background:var(--surface);border:1px solid var(--outline-variant);border-radius:14px;
  padding:12px 14px;display:flex;align-items:center;gap:10px;box-shadow:var(--sh-sm);
  font-size:13px;color:var(--on-surface);}
.loc-field svg{width:18px;height:18px;flex-shrink:0;}
.loc-field input{border:none;outline:none;font-size:13px;font-family:inherit;color:var(--on-surface);background:transparent;flex:1;}
.loc-field input::placeholder{color:var(--on-surface-dim);}

.route-type-tabs{display:flex;background:var(--surface-container);border-radius:14px;
  border:1px solid var(--outline-variant);padding:4px;gap:2px;}
.route-tab{flex:1;padding:8px 4px;border-radius:10px;display:flex;flex-direction:column;
  align-items:center;gap:3px;font-size:10px;font-weight:600;color:var(--on-surface-dim);
  cursor:pointer;transition:all .2s;border:none;font-family:inherit;background:transparent;}
.route-tab.active{background:var(--surface);color:var(--primary);box-shadow:var(--sh-sm);}
.route-tab svg{width:18px;height:18px;fill:currentColor;}

.route-card{border-radius:var(--r-lg);padding:14px;cursor:pointer;transition:all .2s;border:1px solid var(--outline-variant);background:var(--surface);}
.route-card.selected{border:2px solid rgba(46,125,50,.5);background:var(--safe-surface);box-shadow:0 4px 16px rgba(46,125,50,.15);}
.route-card.caution-sel.selected{border-color:rgba(245,127,23,.5);background:var(--caution-surface);box-shadow:0 4px 16px rgba(245,127,23,.15);}
.rc-header{display:flex;align-items:flex-start;gap:10px;margin-bottom:10px;}
.rc-icon{width:38px;height:38px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.rc-icon.green{background:rgba(46,125,50,.12);}
.rc-icon.amber{background:rgba(245,127,23,.12);}
.rc-icon.blue{background:rgba(92,107,192,.12);}
.rc-icon svg{width:20px;height:20px;}
.rc-icon.green svg{fill:var(--safe);} .rc-icon.amber svg{fill:var(--caution);} .rc-icon.blue svg{fill:var(--tertiary);}
.rc-meta{flex:1;}
.rc-meta h3{font-size:13px;font-weight:700;display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.rec-badge{font-size:9px;font-weight:700;background:var(--primary);color:#fff;border-radius:20px;padding:2px 7px;}
.rc-meta p{font-size:11px;color:var(--on-surface-dim);margin-top:2px;}
.score-pill{width:46px;height:46px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.score-pill.green{background:rgba(46,125,50,.12);}
.score-pill.amber{background:rgba(245,127,23,.12);}
.score-pill span{font-size:13px;font-weight:800;}
.score-pill small{font-size:8px;font-weight:700;letter-spacing:.2px;}
.score-pill.green span,.score-pill.green small{color:var(--safe);}
.score-pill.amber span,.score-pill.amber small{color:var(--caution);}
.rc-stats{display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap;}
.stat-pill{display:flex;align-items:center;gap:4px;padding:3px 8px;background:var(--surface-container);border-radius:20px;font-size:10px;font-weight:600;color:var(--on-surface-variant);}
.stat-pill svg{width:10px;height:10px;fill:currentColor;}
.rc-tags{display:flex;gap:5px;flex-wrap:wrap;}
.tag{font-size:10px;font-weight:600;border-radius:20px;padding:2px 8px;display:flex;align-items:center;gap:4px;}
.tag.green{color:var(--safe);background:var(--safe-surface);}
.tag.green svg{width:10px;height:10px;fill:var(--safe);}
.tag.warn{color:var(--caution);}
.tag.warn svg{width:11px;height:11px;fill:var(--caution);}
.warn-row{display:flex;align-items:center;gap:5px;margin-top:6px;font-size:10px;color:var(--caution);}
.warn-row svg{width:11px;height:11px;fill:var(--caution);}

.start-walk-bar{padding:12px 16px;background:var(--surface);border-top:1px solid var(--outline-variant);
  display:flex;align-items:center;gap:12px;flex-shrink:0;}
.swb-info .name{font-size:13px;font-weight:700;} .swb-info .sub{font-size:11px;color:var(--on-surface-dim);}
.start-btn{padding:10px 18px;border-radius:12px;border:none;cursor:pointer;background:var(--primary);color:#fff;
  font-size:12px;font-weight:700;display:flex;align-items:center;gap:6px;font-family:inherit;transition:transform .1s;}
.start-btn:active{transform:scale(.95);}
.start-btn svg{width:14px;height:14px;fill:#fff;}

/* ── Safe Walk ── */
.sw-topbar{margin:8px 12px;padding:10px 14px;background:var(--surface);border-radius:18px;
  box-shadow:var(--sh-md);display:flex;align-items:center;gap:10px;position:relative;z-index:10;}
.pulse-dot{width:10px;height:10px;border-radius:50%;background:var(--safe);flex-shrink:0;
  box-shadow:0 0 0 4px rgba(46,125,50,.25);animation:pulseDot 1.6s ease-in-out infinite;}
@keyframes pulseDot{0%,100%{box-shadow:0 0 0 4px rgba(46,125,50,.25);}50%{box-shadow:0 0 0 9px rgba(46,125,50,0);}}
.sw-label{font-size:13px;font-weight:700;color:var(--safe);flex:1;}
.timer{padding:4px 10px;border-radius:10px;background:var(--surface-container);
  font-size:12px;font-weight:600;color:var(--on-surface-variant);font-family:monospace;}
.stop-btn{width:28px;height:28px;border-radius:50%;background:var(--danger-surface);
  display:flex;align-items:center;justify-content:center;cursor:pointer;border:none;}
.stop-btn svg{width:14px;height:14px;fill:var(--danger);}

.sw-map{flex:1;background:#dde8e5;position:relative;min-height:100px;}
.sw-bottom{background:var(--surface);border-radius:24px 24px 0 0;box-shadow:0 -4px 24px rgba(0,0,0,.12);padding:10px 18px 14px;flex-shrink:0;}
.prog-row{display:flex;justify-content:space-between;margin-bottom:6px;}
.prog-label{font-size:11px;font-weight:600;color:var(--on-surface-dim);}
.prog-pct{font-size:11px;font-weight:700;color:var(--primary);}
.prog-bar{height:8px;background:var(--primary-container);border-radius:4px;overflow:hidden;margin-bottom:14px;}
.prog-fill{height:100%;border-radius:4px;background:var(--primary);transition:width .5s ease;}
.walk-stats{display:flex;gap:8px;margin-bottom:12px;}
.walk-stat{flex:1;padding:10px 6px;border-radius:12px;display:flex;flex-direction:column;align-items:center;gap:3px;}
.walk-stat svg{width:18px;height:18px;} .walk-stat .wv{font-size:14px;font-weight:800;} .walk-stat .wl{font-size:10px;color:var(--on-surface-dim);font-weight:600;}
.ws-primary{background:rgba(0,137,123,.08);}
.ws-primary svg,.ws-primary .wv{fill:var(--primary);color:var(--primary);}
.ws-secondary{background:rgba(84,110,122,.08);}
.ws-secondary svg,.ws-secondary .wv{fill:#546E7A;color:#546E7A;}
.ws-green{background:var(--safe-surface);}
.ws-green svg,.ws-green .wv{fill:var(--safe);color:var(--safe);}
.dest-row{padding:12px;background:var(--surface-container);border-radius:14px;display:flex;align-items:center;gap:10px;}
.dest-row svg{width:20px;height:20px;fill:var(--primary);}
.dest-info p{font-size:10px;color:var(--on-surface-dim);margin-bottom:1px;}
.dest-info h3{font-size:13px;font-weight:700;}

/* ── Community ── */
.comm-header{padding:14px 18px 10px;background:var(--surface);border-bottom:1px solid var(--outline-variant);flex-shrink:0;display:flex;align-items:center;}
.comm-header h1{font-size:22px;font-weight:800;flex:1;}
.report-btn{padding:8px 14px;border-radius:10px;border:none;cursor:pointer;
  background:var(--primary);color:#fff;font-size:12px;font-weight:700;
  display:flex;align-items:center;gap:5px;font-family:inherit;}
.report-btn svg{width:14px;height:14px;fill:#fff;}

.stats-banner{margin:12px 14px 0;padding:14px;background:linear-gradient(135deg,rgba(0,137,123,.07),var(--primary-container));
  border:1px solid rgba(0,137,123,.2);border-radius:var(--r-lg);display:flex;align-items:center;}
.stats-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;}
.stats-item .sv{font-size:18px;font-weight:800;}
.stats-item .sl{font-size:10px;font-weight:600;color:var(--on-surface-dim);}
.stats-div{width:1px;height:36px;background:var(--outline-variant);}

.filter-scroll{display:flex;gap:6px;padding:10px 14px;overflow-x:auto;flex-shrink:0;}
.filter-scroll::-webkit-scrollbar{display:none;}
.fchip{display:flex;align-items:center;gap:5px;padding:6px 12px;border-radius:20px;
  border:1px solid var(--outline-variant);font-size:11px;font-weight:600;
  background:var(--surface-container);color:var(--on-surface-variant);white-space:nowrap;
  cursor:pointer;transition:all .2s;}
.fchip.active{background:var(--primary-container);border-color:var(--primary);color:var(--primary);}
.fchip svg{width:12px;height:12px;fill:currentColor;}

.alert-card{background:var(--surface);border:1px solid var(--outline-variant);border-radius:var(--r-lg);padding:14px;cursor:pointer;transition:box-shadow .2s;}
.alert-card:active{box-shadow:var(--sh-md);}
.ac-head{display:flex;align-items:flex-start;gap:10px;margin-bottom:8px;}
.ac-icon{width:42px;height:42px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.ac-icon svg{width:20px;height:20px;}
.ac-icon.high{background:var(--danger-surface);}  .ac-icon.high svg{fill:var(--danger);}
.ac-icon.medium{background:var(--caution-surface);} .ac-icon.medium svg{fill:var(--caution);}
.ac-icon.low{background:rgba(21,101,192,.1);}   .ac-icon.low svg{fill:var(--map-police);}
.ac-meta{flex:1;}
.ac-meta h3{font-size:13px;font-weight:700;margin-bottom:3px;}
.ac-loc{font-size:11px;color:var(--on-surface-dim);display:flex;align-items:center;gap:3px;}
.ac-loc svg{width:10px;height:10px;fill:var(--on-surface-dim);}
.sev-badge{padding:3px 9px;border-radius:20px;font-size:10px;font-weight:700;flex-shrink:0;}
.sev-badge.high{background:var(--danger-surface);color:var(--danger);}
.sev-badge.medium{background:var(--caution-surface);color:var(--caution);}
.sev-badge.low{background:var(--safe-surface);color:var(--safe);}
.ac-desc{font-size:12px;color:var(--on-surface-variant);line-height:1.4;margin-bottom:10px;}
.ac-foot{display:flex;align-items:center;gap:8px;}
.cat-chip{padding:3px 9px;border-radius:20px;font-size:10px;font-weight:600;
  background:var(--surface-container);color:var(--on-surface-variant);}
.verified{display:flex;align-items:center;gap:3px;font-size:10px;color:var(--primary);font-weight:600;}
.verified svg{width:11px;height:11px;fill:var(--primary);}
.upvote-btn{margin-left:auto;display:flex;align-items:center;gap:4px;font-size:11px;
  color:var(--on-surface-dim);cursor:pointer;background:none;border:none;font-family:inherit;padding:4px 6px;border-radius:8px;}
.upvote-btn:active{background:var(--surface-container);}
.upvote-btn svg{width:13px;height:13px;fill:currentColor;}
.upvote-btn.voted{color:var(--primary);}
.av-sm{width:24px;height:24px;border-radius:50%;background:var(--primary-container);
  display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--primary);}

/* ── Report Incident ── */
.section-lbl{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700;margin-bottom:10px;}
.section-lbl svg{width:16px;height:16px;fill:var(--primary);}
.cat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
.cat-tile{border-radius:14px;padding:10px 4px;display:flex;flex-direction:column;align-items:center;gap:6px;
  cursor:pointer;border:1px solid var(--outline-variant);background:var(--surface-container);transition:all .2s;}
.cat-tile.active{background:var(--primary-container);border:2px solid var(--primary);}
.cat-tile svg{width:26px;height:26px;fill:var(--on-surface-variant);}
.cat-tile.active svg{fill:var(--primary);}
.cat-tile span{font-size:9px;font-weight:600;text-align:center;color:var(--on-surface-variant);line-height:1.2;}
.cat-tile.active span{color:var(--primary);font-weight:700;}
.sev-row{display:flex;gap:8px;}
.sev-tile{flex:1;padding:9px 4px;border-radius:12px;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;
  border:1px solid var(--outline-variant);background:var(--surface-container);transition:all .2s;font-size:10px;font-weight:600;color:var(--on-surface-dim);}
.sev-tile .dot{width:10px;height:10px;border-radius:50%;}
.sev-tile:nth-child(1) .dot{background:var(--safe);}
.sev-tile:nth-child(2) .dot{background:var(--caution);}
.sev-tile:nth-child(3) .dot{background:var(--alert);}
.sev-tile:nth-child(4) .dot{background:var(--danger);}
.sev-tile.active:nth-child(1){background:var(--safe-surface);border-color:var(--safe);color:var(--safe);}
.sev-tile.active:nth-child(2){background:var(--caution-surface);border-color:var(--caution);color:var(--caution);}
.sev-tile.active:nth-child(3){background:var(--alert-surface);border-color:var(--alert);color:var(--alert);}
.sev-tile.active:nth-child(4){background:var(--danger-surface);border-color:var(--danger);color:var(--danger);}
.desc-field{width:100%;padding:12px;border-radius:12px;border:1px solid var(--outline-variant);
  font-family:inherit;font-size:13px;color:var(--on-surface);background:var(--surface);
  resize:none;outline:none;transition:border-color .2s;}
.desc-field:focus{border-color:var(--primary);}
.anon-note{padding:12px;border-radius:12px;background:rgba(0,137,123,.08);
  display:flex;align-items:flex-start;gap:10px;font-size:12px;color:var(--primary);}
.anon-note svg{width:16px;height:16px;fill:var(--primary);flex-shrink:0;margin-top:1px;}

/* Success screen */
.success-screen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;background:var(--bg);}
.success-icon{width:100px;height:100px;border-radius:50%;background:var(--safe-surface);
  display:flex;align-items:center;justify-content:center;margin-bottom:24px;animation:bounceIn .6s cubic-bezier(.25,.46,.45,.94);}
.success-icon svg{width:52px;height:52px;fill:var(--safe);}
@keyframes bounceIn{0%{transform:scale(0.4);opacity:0;}60%{transform:scale(1.1);}100%{transform:scale(1);opacity:1;}}

/* ── Profile ── */
.profile-hero{padding:20px 20px 24px;background:linear-gradient(175deg,#004D45,#00897B,#26A69A);}
.ph-row{display:flex;align-items:center;gap:12px;margin-bottom:20px;}
.ph-text p{font-size:11px;font-weight:600;color:rgba(255,255,255,.6);letter-spacing:.5px;margin-bottom:2px;}
.ph-text h2{font-size:22px;font-weight:800;color:#fff;}
.ph-avatar{width:56px;height:56px;border-radius:28px;margin-left:auto;background:rgba(255,255,255,.2);
  display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:800;color:#fff;}
.ph-stats{display:flex;}
.ph-stat{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;}
.ph-stat .v{font-size:18px;font-weight:800;color:#fff;}
.ph-stat .l{font-size:10px;font-weight:600;color:rgba(255,255,255,.6);}
.ph-div{width:1px;height:32px;background:rgba(255,255,255,.2);}

.sec-card{background:var(--surface);border:1px solid var(--outline-variant);border-radius:var(--r-lg);overflow:hidden;margin-bottom:10px;}
.sec-head{padding:12px 14px 8px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--outline-variant);}
.sec-head svg{width:16px;height:16px;}
.sec-head span{font-size:13px;font-weight:700;flex:1;}
.sec-head .act{font-size:12px;font-weight:700;color:var(--primary);cursor:pointer;background:none;border:none;font-family:inherit;}
.contact-tile{display:flex;align-items:center;gap:10px;padding:10px 14px;}
.c-av{width:36px;height:36px;border-radius:18px;background:var(--primary-container);position:relative;
  display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:var(--primary);}
.c-star{position:absolute;bottom:-1px;right:-1px;width:14px;height:14px;border-radius:50%;
  background:var(--sos);border:1.5px solid #fff;display:flex;align-items:center;justify-content:center;}
.c-star svg{width:8px;height:8px;fill:#fff;}
.c-info .name{font-size:13px;font-weight:700;}
.c-info .sub{font-size:11px;color:var(--on-surface-dim);}
.toggle-tile{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;}
.toggle-tile svg{width:18px;height:18px;flex-shrink:0;}
.ti-info{flex:1;}
.ti-info .t{font-size:13px;font-weight:500;}
.ti-info .s{font-size:11px;color:var(--on-surface-dim);}
.toggle{width:44px;height:26px;border-radius:13px;position:relative;transition:background .25s;flex-shrink:0;}
.toggle.on{background:var(--primary);}
.toggle.off{background:var(--surface-container);}
.toggle-thumb{width:20px;height:20px;border-radius:50%;background:#fff;position:absolute;top:3px;
  transition:left .25s;box-shadow:0 1px 4px rgba(0,0,0,.2);}
.toggle.on .toggle-thumb{left:21px;} .toggle.off .toggle-thumb{left:3px;}
.list-tile{display:flex;align-items:center;gap:10px;padding:11px 14px;cursor:pointer;}
.list-tile svg{width:18px;height:18px;flex-shrink:0;fill:var(--on-surface-variant);}
.lt-info{flex:1;}
.lt-info .t{font-size:13px;font-weight:500;}
.lt-info .s{font-size:11px;color:var(--on-surface-dim);}
.lt-chev svg{width:16px;height:16px;fill:var(--on-surface-dim);}

/* ── SOS Modal ── */
.sos-modal{position:absolute;inset:0;z-index:300;display:flex;align-items:center;justify-content:center;
  background:rgba(0,0,0,.5);padding:24px;animation:fadeIn .2s ease;}
.sos-card{background:var(--sos);border-radius:28px;padding:32px;width:100%;text-align:center;
  animation:slideInRight .3s cubic-bezier(.25,.46,.45,.94);}
.sos-icon-pulse{width:80px;height:80px;border-radius:50%;border:3px solid #fff;
  display:flex;align-items:center;justify-content:center;margin:0 auto 20px;
  background:rgba(255,255,255,.12);animation:sosPulse 1.4s ease-in-out infinite;}
.sos-icon-pulse svg{width:40px;height:40px;fill:#fff;}
.sos-card h2{font-size:20px;font-weight:800;color:#fff;letter-spacing:1.5px;margin-bottom:8px;}
.sos-card p{font-size:14px;color:rgba(255,255,255,.75);margin-bottom:6px;}
.sos-cancel{margin-top:20px;padding:12px;border-radius:12px;border:1.5px solid #fff;
  background:transparent;color:#fff;font-size:14px;font-weight:700;cursor:pointer;width:100%;font-family:inherit;}

/* ── Toast ── */
.toast{position:absolute;bottom:80px;left:50%;transform:translateX(-50%);
  background:var(--on-surface);color:#fff;padding:10px 18px;border-radius:20px;
  font-size:12px;font-weight:600;white-space:nowrap;z-index:200;
  animation:toastIn .3s ease, toastOut .3s ease 2s forwards;}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes toastOut{to{opacity:0;transform:translateX(-50%) translateY(8px)}}

/* ── Loading spinner ── */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;flex:1;}
.spinner{width:36px;height:36px;border:3px solid var(--primary-container);
  border-top-color:var(--primary);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
</style>

// ═══════════════════════════════════════════════════════
// RENDER ENGINE
// ═══════════════════════════════════════════════════════
const shell = document.getElementById('shell');

function render(){
  const isDark = ['onboarding','safe-walk','profile'].includes(state.screen) && state.screen !== 'profile';
  shell.innerHTML = statusBar(isDark) + screenHTML();
  attachEvents();
}

function statusBar(dark){
  const cl = dark ? 'dark' : 'light';
  const now = new Date(); const h=String(now.getHours()).padStart(2,'0'), m=String(now.getMinutes()).padStart(2,'0');
  return `<div class="status-bar ${cl}">
    <span>${h}:${m}</span>
    <div class="status-icons">${ICONS.wifi}${ICONS.battery}</div>
  </div>`;
}

function screenHTML(){
  switch(state.screen){
    case 'onboarding':   return renderOnboarding();
    case 'home':         return renderHome();
    case 'routes':       return renderRoutes();
    case 'safe-walk':    return renderSafeWalk();
    case 'community':    return renderCommunity();
    case 'report':       return renderReport();
    case 'report-done':  return renderReportDone();
    case 'profile':      return renderProfile();
    default: return renderHome();
  }
}

// ─── ONBOARDING ───────────────────────────────────────
function renderOnboarding(){
  const p = OB_PAGES[state.obPage];
  const isLast = state.obPage === OB_PAGES.length - 1;
  const dots = OB_PAGES.map((_,i)=>`<div class="ob-dot${i===state.obPage?' active':''}"></div>`).join('');
  const cta = p.perm
    ? `<button class="btn btn-filled" id="btn-perm">Allow Location Access</button>
       <button class="btn" style="background:none;color:rgba(255,255,255,.6);margin-top:8px" id="btn-skip-perm">Not now</button>`
    : p.contact
    ? `<button class="btn btn-filled" id="btn-contact">Add Emergency Contact</button>
       <button class="btn" style="background:none;color:rgba(255,255,255,.6);margin-top:8px" id="btn-finish">Skip for now</button>`
    : `<button class="btn btn-filled" id="btn-ob-next">${isLast?'Get Started':'Next'}</button>`;

  const obIcons = {shield:'shield',map:'map',people:'people',sos:'sos',loc:'loc',contact:'contact'};
  const iconKey = obIcons[p.icon] || 'shield';

  return `<div class="screen slide-in-right" style="background:linear-gradient(175deg,${p.color})">
    <div class="ob-screen">
      ${state.obPage>0?`<button class="ob-skip" id="btn-skip">Skip</button>`:`<div style="height:38px"></div>`}
      <div class="ob-illus" style="background:rgba(255,255,255,.18)">${ICONS[iconKey]}</div>
      <div class="ob-title">${p.title.replace('\n','<br>')}</div>
      <div class="ob-body">${p.body}</div>
      <div class="ob-dots">${dots}</div>
      <div style="display:flex;flex-direction:column;gap:0;width:100%">${cta}</div>
    </div>
  </div>`;
}

  const r = ROUTES[state.selectedRoute];

  const layerChips = [
    {key:'routes', label:'Safe Routes', cls:'on-green', icon:'shield'},
    {key:'crowd',  label:'Crowd',       cls:'on-purple',icon:'people'},

    {key:'police', label:'Police',      cls:'on-blue',  icon:'police'},
    {key:'alerts', label:'Alerts',      cls:'on-red',   icon:'report'},

  const alertBanner = !state.alertDismissed ? `

      <span class="ab-action" id="btn-reroute">Reroute</span>

    <!-- Map -->
    <div class="map-bg">

      ${layers.routes?`<svg style="position:absolute;inset:0;width:100%;height:100%;overflow:visible" viewBox="0 0 375 400">

      ${layers.alerts?`<div class="map-zone" style="width:90px;height:90px;background:rgba(198,40,40,.07);border:2px solid rgba(198,40,40,.2);top:55%;left:60%;"></div>`:''}
      ${layers.lighting?`<div class="map-zone" style="width:75px;height:75px;background:rgba(245,127,23,.07);border:1.5px solid rgba(245,127,23,.2);top:38%;left:55%;"></div>`:''}
      ${layers.crowd?`<div class="map-zone" style="width:100px;height:100px;background:rgba(0,137,123,.06);border:2px solid rgba(0,137,123,.15);top:20%;left:12%;"></div>`:''}
      ${layers.police?`<div style="position:absolute;top:28%;left:14%;width:22px;height:22px;border-radius:50%;background:var(--map-police);display:flex;align-items:center;justify-content:center;box-shadow:0 2px 6px rgba(0,0,0,.2)">${ICONS.shield}</div>`:''}
      <!-- User dot -->
      <div style="position:absolute;left:calc(80/375*100% - 8px);top:calc(300/500*100% - 8px);width:16px;height:16px;border-radius:50%;background:var(--primary);border:3px solid #fff;box-shadow:0 0 0 6px rgba(0,137,123,.25);z-index:5"></div>
    </div>

    <div class="map-content">
      <!-- Top bar -->
      <div class="home-topbar">
        <div class="brand-pill">${ICONS.shield} presence</div>

        <button class="map-icon-btn ${shareActive}" id="btn-share-loc" style="margin-left:auto" title="Share location">${ICONS.share}</button>

              <circle cx="32" cy="32" r="26" fill="none" stroke="${score>=75?'var(--safe)':'var(--caution)'}" stroke-width="6"

      </div>
    </div>

// ─── ROUTES ───────────────────────────────────────────
function renderRoutes(){
  const tabs = ['Safest','Fastest','Active'].map((t,i)=>`
    <button class="route-tab${state.routeTab===i?' active':''}" data-tab="${i}">
      ${ICONS[['shield','bolt','people'][i]]}${t}
    </button>`).join('');

  const cards = ROUTES.map((r,i)=>`
    <div class="route-card${state.selectedRoute===i?' selected':''} ${r.sev==='amber'?'caution-sel':''}" data-route="${i}">
      <div class="rc-header">
        <div class="rc-icon ${r.color}">${ICONS[r.icon]}</div>
        <div class="rc-meta">
          <h3>${r.label} ${r.rec?`<span class="rec-badge">Recommended</span>`:''}</h3>
          <p>${r.via} — ${r.sub}</p>
        </div>
        <div class="score-pill ${r.sev}"><span>${r.score}</span><small>${r.sev==='green'?'Safe':'Caution'}</small></div>
      </div>
      <div class="rc-stats">
        <span class="stat-pill">${ICONS.walk}${r.dist}</span>
        <span class="stat-pill">${ICONS.clock}${r.dur}</span>
        <span class="stat-pill" style="color:var(--caution)">${ICONS.bulb}${r.light}</span>
        <span class="stat-pill" style="color:var(--primary)">${ICONS.people}${r.crowd}</span>
      </div>
      <div class="rc-tags">
        ${r.tags.map(t=>`<span class="tag green">${ICONS.check}${t}</span>`).join('')}
      </div>
      ${r.warns.map(w=>`<div class="warn-row">${ICONS.warn}${w}</div>`).join('')}
    </div>`).join('');

  const selR = ROUTES[state.selectedRoute];

  return `<div class="screen" style="background:var(--bg)">
    <div class="app-bar">Plan Route</div>
    <div class="screen-scroll">
      <div style="padding:14px;display:flex;flex-direction:column;gap:4px;">
        <div class="loc-field">${ICONS.loc} Market Street &amp; 4th</div>
        <div style="display:flex;justify-content:center;margin:2px 0">
          <div style="width:30px;height:30px;border-radius:50%;background:var(--surface);border:1px solid var(--outline-variant);display:flex;align-items:center;justify-content:center;cursor:pointer">${ICONS.route}</div>
        </div>
        <div class="loc-field"><svg viewBox="0 0 24 24" style="width:18px;height:18px;fill:var(--danger)"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/></svg>
          <input placeholder="Where are you going?" id="dest-input" autocomplete="off"/>
        </div>
      </div>
      <div style="margin:0 14px 12px">
        <div class="route-type-tabs">${tabs}</div>
      </div>
      <div style="padding:0 14px;display:flex;flex-direction:column;gap:10px;padding-bottom:80px">${cards}</div>
    </div>
    <div class="start-walk-bar">
      <div class="swb-info"><div class="name">${selR.label}</div><div class="sub">${selR.dist} · ${selR.dur}</div></div>
      <button class="start-btn" id="btn-start-walk">${ICONS.walk} Start Walk</button>
    </div>
    ${bottomNav('routes')}
  </div>`;
}

// ─── SAFE WALK ────────────────────────────────────────
function renderSafeWalk(){
  const r = ROUTES[state.selectedRoute];
  const prog = state.walkProgress;
  const elapsed = state.walkSeconds;
  const mm = String(Math.floor(elapsed/60)).padStart(2,'0');
  const ss = String(elapsed%60).padStart(2,'0');
  const remaining = Math.max(0, Math.round(r.dur.replace(' min','')*60*(1-prog/100)/60));

  return `<div class="screen" style="background:var(--bg)">
    <div class="sw-topbar">
      <div class="pulse-dot"></div>
      <span class="sw-label">Safe Walk Active</span>
      <div class="timer">${mm}:${ss}</div>
      <button class="stop-btn" id="btn-stop-walk">${ICONS.stop}</button>
    </div>

    ${prog>20?`<div class="alert-banner caution" style="margin:0 12px 6px">
      <div class="ab-icon">${ICONS.eye}</div>
      <span class="ab-text">Suspicious activity reported 100m left</span>
      <span class="ab-action">Reroute</span>
      <button class="ab-close" id="btn-dismiss-sw-alert">✕</button>
    </div>`:''}

    <div class="sw-map">
      <svg style="position:absolute;inset:0;width:100%;height:100%;" viewBox="0 0 375 160" preserveAspectRatio="xMidYMid slice">
        <rect width="375" height="160" fill="#dde8e5"/>
        <line x1="0" y1="80" x2="375" y2="80" stroke="white" stroke-width="9"/>
        <line x1="190" y1="0" x2="190" y2="160" stroke="white" stroke-width="6" opacity=".6"/>
        <polyline points="30,140 90,110 160,80 230,55 320,30" stroke="var(--primary)" stroke-width="5" fill="none" stroke-dasharray="10 5" stroke-linecap="round"/>
        <circle cx="${30+prog*2.9}" cy="${140-prog*1.1}" r="9" fill="var(--primary)" stroke="white" stroke-width="3"/>
        <circle cx="${30+prog*2.9}" cy="${140-prog*1.1}" r="16" fill="rgba(0,137,123,.2)"/>
        <circle cx="320" cy="30" r="8" fill="var(--safe)" stroke="white" stroke-width="2"/>
      </svg>
    </div>

    <div class="sw-bottom">
      <div class="drag-handle"></div>
      <div class="prog-row"><span class="prog-label">Progress</span><span class="prog-pct">${prog}%</span></div>
      <div class="prog-bar"><div class="prog-fill" style="width:${prog}%"></div></div>
      <div class="walk-stats">
        <div class="walk-stat ws-primary">${ICONS.clock}<span class="wv">${remaining} min</span><span class="wl">Remaining</span></div>
        <div class="walk-stat ws-secondary">${ICONS.walk}<span class="wv">${r.dist}</span><span class="wl">Total</span></div>
        <div class="walk-stat ws-green">${ICONS.shield}<span class="wv">${r.score}</span><span class="wl">Safety</span></div>
      </div>
      <div class="dest-row">
        ${ICONS.nav}
        <div class="dest-info"><p>Heading to</p><h3>${r.via}</h3></div>
        <div class="safe-badge" style="font-size:10px;padding:4px 10px">${r.sev==='green'?'Safe':'Caution'}</div>
      </div>
    </div>

    <button class="sos-fab" id="btn-sos" style="bottom:195px">${ICONS.sos}</button>
    ${state.sosActive ? renderSOSModal() : ''}
  </div>`;
}

// ─── COMMUNITY ────────────────────────────────────────
function renderCommunity(){
  const filtered = state.communityFilter
    ? ALERTS.filter(a=>a.cat===state.communityFilter)
    : ALERTS;

  const filters = CAT_FILTERS.map(f=>`
    <div class="fchip${state.communityFilter===f.id?' active':''}" data-filter="${f.id}">
      ${ICONS[f.icon]||''}${f.label}
    </div>`).join('');

  const cards = filtered.map((a,i)=>`
    <div class="alert-card fade-in" style="animation-delay:${i*40}ms" data-alert="${a.id}">
      <div class="ac-head">
        <div class="ac-icon ${a.sev}">${ICONS[{harassment:'report',lighting:'bulb',suspicious:'eye',street:'warn',police:'police',accident:'carcrash',other:'more'}[a.cat]||'report']}</div>
        <div class="ac-meta">
          <h3>${a.title}</h3>
          <div class="ac-loc">${ICONS.loc}${a.loc} · ${a.time}</div>
        </div>
        <div class="sev-badge ${a.sev}">${a.sev.charAt(0).toUpperCase()+a.sev.slice(1)}</div>
      </div>
      <div class="ac-desc">${a.desc}</div>
      <div class="ac-foot">
        <span class="cat-chip">${a.cat.charAt(0).toUpperCase()+a.cat.slice(1)}</span>
        ${a.verified?`<div class="verified">${ICONS.verified}Verified</div>`:''}
        <button class="upvote-btn ${state.votes[a.id]?'voted':''}" data-vote="${a.id}">
          ${ICONS.thumb}${(a.votes+(state.votes[a.id]?1:0))}
        </button>
        <div class="av-sm">${a.av}</div>
      </div>
    </div>`).join('');

  const total = filtered.length;
  const verified = filtered.filter(a=>a.verified).length;

  return `<div class="screen" style="background:var(--bg)">
    <div class="comm-header">
      <h1>Community</h1>
      <button class="report-btn" id="btn-report">${ICONS.add}Report</button>
    </div>
    <div class="screen-scroll">
      <div class="stats-banner">
        <div class="stats-item"><span class="sv" style="color:var(--alert)">${total}</span><span class="sl">Nearby Alerts</span></div>
        <div class="stats-div"></div>
        <div class="stats-item"><span class="sv" style="color:var(--primary)">247</span><span class="sl">Active Users</span></div>
        <div class="stats-div"></div>
        <div class="stats-item"><span class="sv" style="color:var(--safe)">${verified}</span><span class="sl">Verified</span></div>
      </div>
      <div class="filter-scroll">${filters}</div>
      <div style="padding:0 14px;display:flex;flex-direction:column;gap:10px;padding-bottom:80px">
        ${cards.length ? cards : `<div style="text-align:center;padding:40px;color:var(--on-surface-dim)">No alerts for this filter</div>`}
      </div>
    </div>
    ${bottomNav('community')}
  </div>`;
}

          <div class="section-lbl">${ICONS.report}What happened?</div>
          <div class="cat-grid">
            ${cats.map(c=>`<div class="cat-tile${state.reportCat===c.id?' active':''}" data-cat="${c.id}">${ICONS[c.icon]}<span>${c.label}</span></div>`).join('')}

}

function listTile(ico, title, sub, col=null, hasChev=true){

// ═══════════════════════════════════════════════════════
// EVENTS
// ═══════════════════════════════════════════════════════
function go(screen){ state.screen = screen; render(); }
function toast(msg){
  const t = document.createElement('div');
  t.className = 'toast'; t.textContent = msg;
  shell.appendChild(t);
  setTimeout(()=>t.remove(), 2600);
}

function attachEvents(){
  const on = (id,ev,fn)=>{ const el=document.getElementById(id); if(el) el.addEventListener(ev,fn); };
  const all = (sel,ev,fn)=>{ document.querySelectorAll(sel).forEach(el=>el.addEventListener(ev,fn)); };

  // ── Onboarding ──
  on('btn-ob-next','click',()=>{ state.obPage = Math.min(state.obPage+1, OB_PAGES.length-1); render(); });
  on('btn-skip','click',()=>{ go('home'); });
  on('btn-perm','click',()=>{ toast('Location access granted'); state.obPage++; render(); });
  on('btn-skip-perm','click',()=>{ state.obPage++; render(); });
  on('btn-contact','click',()=>{ toast('Contact added: Mom'); go('home'); });
  on('btn-finish','click',()=>{ go('home'); });

  // ── Nav ──
  all('[data-nav]','click',e=>{ go(e.currentTarget.dataset.nav); });

  // ── Home ──
  on('btn-plan-route','click',()=>{ go('routes'); });
  on('btn-reroute','click',()=>{ go('routes'); });
  on('btn-dismiss-alert','click',()=>{ state.alertDismissed=true; render(); });
  on('btn-share-loc','click',()=>{ state.locationSharing=!state.locationSharing; toast(state.locationSharing?'Location sharing on':'Location sharing off'); render(); });
  on('btn-share-loc2','click',()=>{ state.locationSharing=!state.locationSharing; toast(state.locationSharing?'Location sharing on':'Location sharing off'); render(); });
  on('btn-layers','click',()=>{ toast('Layers panel — use chips below to toggle'); });
  all('[data-layer]','click',e=>{
    const k=e.currentTarget.dataset.layer;
    state.layers[k]=!state.layers[k];
    render();
  });

  // ── SOS ──
  all('#btn-sos','click',()=>{ state.sosActive=true; render(); });
  on('btn-cancel-sos','click',()=>{ state.sosActive=false; toast('SOS cancelled'); render(); });

  // ── Routes ──
  all('[data-route]','click',e=>{ state.selectedRoute=+e.currentTarget.dataset.route; render(); });
  all('[data-tab]','click',e=>{ state.routeTab=+e.currentTarget.dataset.tab; render(); });
  on('btn-start-walk','click',()=>{ startWalk(); });

  // ── Safe Walk ──
  on('btn-stop-walk','click',()=>{
    if(confirm('End your safe walk?')){ stopWalk(); go('home'); }
  });
  on('btn-dismiss-sw-alert','click',()=>render());

  // ── Community ──
  on('btn-report','click',()=>{ state.reportCat=null; state.reportDesc=''; go('report'); });
  all('[data-filter]','click',e=>{
    const v = e.currentTarget.dataset.filter;
    state.communityFilter = (v==='null'||v===state.communityFilter) ? null : v;
    render();
  });
  all('[data-vote]','click',e=>{
    const id=+e.currentTarget.dataset.vote;
    state.votes[id]=!state.votes[id];
    render();
  });

  // ── Report ──
  on('btn-back-report','click',()=>go('community'));
  all('[data-cat]','click',e=>{ state.reportCat=e.currentTarget.dataset.cat; render(); });
  all('[data-sev]','click',e=>{ state.reportSev=+e.currentTarget.dataset.sev; render(); });
  on('report-desc','input',e=>{ state.reportDesc=e.target.value; });
  on('btn-submit-report','click',()=>{
    if(!state.reportCat) return;
    go('report-done');
    // Add to feed
    ALERTS.unshift({id:Date.now(),cat:state.reportCat,sev:['low','medium','high','critical'][state.reportSev],
      title:`${state.reportCat} reported nearby`,loc:'Current location',time:'Just now',
      desc:state.reportDesc||'Reported by community member.',votes:1,verified:false,av:'Y'});
  });
  on('btn-back-community','click',()=>go('community'));

  // ── Profile ──
  all('[data-toggle]','click',e=>{
    const k=e.currentTarget.dataset.toggle;
    state.toggles[k]=!state.toggles[k];
    render();
  });
  on('btn-add-contact','click',()=>toast('Add contact — in full app'));
}

// ═══════════════════════════════════════════════════════
// SAFE WALK TIMER
// ═══════════════════════════════════════════════════════
function startWalk(){
  state.walkProgress = 0;
  state.walkSeconds  = 0;
  go('safe-walk');
  stopWalk(); // clear any existing
  state.walkTimer = setInterval(()=>{
    state.walkSeconds++;
    state.walkProgress = Math.min(100, Math.round(state.walkSeconds / 0.9));
    if(state.walkProgress >= 100){ stopWalk(); showArrival(); return; }
    if(state.screen==='safe-walk') render();
  }, 300); // fast-forward: 1 real sec ≈ 3.3% progress
}

function stopWalk(){
  if(state.walkTimer){ clearInterval(state.walkTimer); state.walkTimer=null; }
}

function showArrival(){
  state.screen='home';
  render();
  setTimeout(()=>{
    const m=document.createElement('div');
    m.className='sos-modal'; m.style.zIndex='400';
    m.innerHTML=`<div class="sos-card" style="background:var(--safe)">
      <div class="sos-icon-pulse" style="border-color:#fff;background:rgba(255,255,255,.15)">${ICONS.check}</div>
      <h2>You Arrived!</h2>
      <p>You safely reached your destination.</p>
      <p>Emergency contacts notified.</p>
      <button class="sos-cancel" onclick="this.closest('.sos-modal').remove()">Done</button>
    </div>`;
    shell.appendChild(m);
  },100);
}

// ═══════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════
render();
// Tick clock every 30s
setInterval(()=>{ if(state.screen!=='safe-walk') render(); }, 30000);
</script>
